# Conformance stack: this Rust zero-cache AND the official rocicorp/zero, both
# pointed at the same logical-replication Postgres, so the differential harness
# can drive them with identical client frames and compare.
#
#   docker compose -f conformance/docker-compose.conformance.yml up --build
#
# then, from the repo root:
#
#   ZERO_RUST_URL=ws://127.0.0.1:4848/sync \
#   ZERO_REF_URL=ws://127.0.0.1:4849/sync \
#   cargo test -p zero-conformance
#
# or the CLI:  cargo run -p zero-conformance --bin conformance
#
# NOTE: the official rocicorp/zero image requires an app schema, an auth secret,
# and a replica file. The env below is a starting point — set ZERO_SCHEMA_JSON /
# ZERO_AUTH_SECRET to your app's values. Scenarios that need seeded data will
# only match once both servers are backed by the same schema+data; the
# protocol-handshake scenarios (connected / ping-pong / init-ordering /
# malformed) compare meaningfully without app data.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zero
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=20
      - -c
      - max_replication_slots=20
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zero"]
      interval: 5s
      timeout: 5s
      retries: 10

  # This Rust port.
  zero-rust:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "4848:4848"
    environment:
      ZERO_LISTEN_ADDR: 0.0.0.0:4848
      ZERO_UPSTREAM_DB: "host=postgres port=5432 user=postgres password=postgres dbname=zero"
    depends_on:
      postgres:
        condition: service_healthy

  # The official reference implementation.
  zero-ref:
    image: rocicorp/zero:latest
    ports:
      - "4849:4848"
    environment:
      ZERO_UPSTREAM_DB: "postgresql://postgres:postgres@postgres:5432/zero"
      ZERO_REPLICA_FILE: "/tmp/zero-replica.db"
      ZERO_PORT: "4848"
      # Set these to your app's values for data-level conformance:
      ZERO_AUTH_SECRET: "conformance-secret"
      # ZERO_SCHEMA_JSON / ZERO_SCHEMA_FILE: your app schema.
    depends_on:
      postgres:
        condition: service_healthy
