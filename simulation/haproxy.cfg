global
    log stdout format raw local0

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 10m
    timeout server 10m

# Docker's embedded DNS returns every replica behind the view-syncer service.
# server-template continuously reconciles those addresses as Compose scales.
resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 2s

frontend zero_sync
    bind *:4848
    default_backend zero_view_syncers

backend zero_view_syncers
    balance leastconn
    option tcp-check
    server-template worker 20 view-syncer:4848 check resolvers docker init-addr libc,none

listen statistics
    mode http
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 2s
